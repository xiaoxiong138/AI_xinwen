sources:
  arxiv:
    enabled: true
    categories:
      - cs.RO
      - cs.AI
      - cs.CV
      - cs.LG
      - eess.SY
    max_results: 20
    candidate_pool: 220
    days_back: 1
    fallback_days:
      - 1
      - 3
      - 7
      - 14
    topic_limits:
      Physical AI: 5
      World Model: 5
      Robotics: 5
    topic_queries:
      Physical AI: all:"physical ai" OR all:"embodied ai" OR all:"vision-language-action" OR all:"robot foundation model" OR all:"embodied agent" OR all:"diffusion policy"
      World Model: all:"world model" OR all:"world models" OR all:"video prediction" OR all:"predictive model" OR all:"latent dynamics" OR all:"dynamics model"
      Robotics: cat:cs.RO OR all:robotics OR all:robot OR all:humanoid OR all:manipulation OR all:locomotion
  rss:
    enabled: true
    days_back: 2
    degradation:
      enabled: true
      failure_threshold: 2
      lookback_runs: 6
      recovery_interval_hours: 12
    feeds:
      - name: OpenAI Blog
        url: https://openai.com/news/rss.xml
        platform: Blog
        content_type: news
        max_entries: 15
      - name: Google Research
        url: https://research.google/blog/rss/
        platform: Blog
        content_type: news
        max_entries: 15
      - name: DeepMind Blog
        url: https://deepmind.google/blog/rss.xml
        platform: Blog
        content_type: news
        max_entries: 15
      - name: Hugging Face Blog
        url: https://huggingface.co/blog/feed.xml
        platform: Blog
        content_type: news
        max_entries: 15
      - name: NVIDIA Blog
        url: https://blogs.nvidia.com/feed/
        platform: Blog
        content_type: news
        max_entries: 15
      - name: AWS Machine Learning Blog
        url: https://aws.amazon.com/blogs/machine-learning/feed/
        platform: Blog
        content_type: news
        max_entries: 15
      - name: Microsoft Research
        url: https://www.microsoft.com/en-us/research/feed/
        platform: Blog
        content_type: news
        max_entries: 15
      - name: TechCrunch AI
        url: https://techcrunch.com/category/artificial-intelligence/feed/
        platform: News
        content_type: news
        max_entries: 15
      - name: VentureBeat AI
        url: https://venturebeat.com/category/ai/feed/
        platform: News
        content_type: news
        max_entries: 15
      - name: MarkTechPost
        url: https://www.marktechpost.com/feed/
        platform: Blog
        content_type: news
        max_entries: 15
      - name: Unite AI
        url: https://www.unite.ai/feed/
        platform: News
        content_type: news
        max_entries: 15
      - name: AI News
        url: https://www.artificialintelligence-news.com/feed/
        platform: News
        content_type: news
        max_entries: 15
  huggingface:
    enabled: false
  web_search:
    enabled: true
    locale: US:en
    days_back: 1
    fallback_days:
      - 1
      - 2
      - 3
    searches:
      - name: AI Agent News
        query: AI agent model release
        platform: News
        content_type: news
        max_results: 8
      - name: Robotics AI News
        query: robotics AI
        platform: News
        content_type: news
        max_results: 8
      - name: World Model News
        query: world model AI
        platform: News
        content_type: news
        max_results: 6
      - name: Physical AI News
        query: physical AI robotics
        platform: News
        content_type: news
        max_results: 6
      - name: Open Source AI
        query: open source LLM
        platform: Website
        content_type: news
        max_results: 6
      - name: AI Infrastructure
        query: AI chip infrastructure
        platform: News
        content_type: news
        max_results: 6
      - name: AI on YouTube
        query: site:youtube.com AI robotics
        platform: YouTube
        content_type: video
        max_results: 6
llm:
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  model: deepseek-chat
  temperature: 0.2
network:
  timeout_seconds: 25
  collector_timeout_seconds: 90
  arxiv_collector_timeout_seconds: 180
report:
  title: AI Frontier Intelligence Daily
  paper_limit: 15
  paper_enrichment_cache_hours: 168
  paper_backfill_hours: 168
  paper_backfill_hours_ladder:
    - 72
    - 168
  min_web_items: 20
  web_backfill_hours: 24
  web_backfill_hours_ladder:
    - 24
    - 48
    - 72
  web_limit: 20
  top_update_limit: 5
  focus_update_limit: 10
  brief_update_limit: 15
source_preferences:
  whitelist_hosts:
    - openai.com
    - anthropic.com
    - deepmind.google
    - google.com
    - huggingface.co
    - blogs.nvidia.com
    - aws.amazon.com
    - microsoft.com
    - techcrunch.com
    - venturebeat.com
    - marktechpost.com
    - unite.ai
    - artificialintelligence-news.com
    - arxiv.org
  blacklist_hosts:
    - youtube.com
    - youtu.be
    - msn.com
    - blockchain-council.org
  source_weights:
    openai.com: 2.5
    anthropic.com: 2.3
    deepmind.google: 2.3
    huggingface.co: 2.0
    blogs.nvidia.com: 2.1
    aws.amazon.com: 1.8
    microsoft.com: 1.7
    techcrunch.com: 1.3
    venturebeat.com: 1.2
    marktechpost.com: 1.2
    unite.ai: 1.0
    youtube.com: -1.6
    youtu.be: -1.6
  platform_weights:
    Blog: 1.0
    News: 0.8
    Website: 0.4
    YouTube: -0.8
    ArXiv: 1.2
  category_weights:
    模型/研究: 0.8
    产品发布: 0.6
    基础设施: 1.0
    开源生态: 0.9
    行业动态: 0.3
    企业合作: 0.5
    社交讨论: -0.3
    视频解读: -0.5
    应用落地: 0.6
preferences:
  content_type_weights:
    paper: 1.4
    news: 1.0
  category_weights:
    Physical AI: 1.0
    World Model: 1.0
    Robotics: 0.9
    模型/研究: 0.7
    产品发布: 0.3
    基础设施: 0.9
    开源生态: 0.8
    行业动态: 0.2
    企业合作: 0.4
    社交讨论: -0.2
    视频解读: -0.4
    应用落地: 0.5
  keyword_weights:
    physical ai: 0.8
    embodied ai: 0.8
    world model: 0.8
    robotics: 0.7
    humanoid: 0.6
    infrastructure: 0.6
    datacenter: 0.6
    chip: 0.6
    inference: 0.5
    open source: 0.5
alerts:
  enabled: true
  recipients_env: EMAIL_RECIPIENT
  arxiv_failure_threshold: 1
  min_update_count: 20
  min_paper_count: 12
  duplicate_ratio_threshold: 0.8
  send_separate_alert: true
trends:
  enabled: true
  lookback_days: 3
  max_items: 5
  min_occurrences: 2
observability:
  source_health_history_limit: 160
archive:
  enabled: true
  report_dir: archive
  output_html: reports_index.html
  output_markdown: reports_index.md
scheduler:
  log_dir: logs
  status_file: logs/last_run.json
  last_success_file: logs/last_success.json
  validation_status_file: logs/last_validation_run.json
  lock_file: logs/scheduler.lock
  doctor_status_file: logs/doctor_latest.json
  doctor_history_file: logs/doctor_history.json
  task_setup_script: setup_scheduled_tasks.ps1
  task_names:
    - Web_Agent_Send_1200_v2
    - Web_Agent_Send_2100_v2
  monitor_auxiliary_tasks: true
  require_offline_tasks: false
  doctor_task_setup_script: setup_doctor_task.ps1
  doctor_task_name: Web_Agent_Doctor_0900
  doctor_task_time: "09:00"
  preflight_task_setup_script: setup_preflight_task.ps1
  preflight_task_name: Web_Agent_Preflight_2030
  preflight_task_time: "20:30"
  log_retention_days: 30
  idempotency_window_minutes: 240
  max_run_seconds: 2700
  validation_max_run_seconds: 900
  validation_report_dir: archive/validation
  validation_report_retention_days: 7
  max_attempts: 2
  retry_delay_seconds: 60
  stale_lock_seconds: 10800
  send_failure_email: true
  send_doctor_alert_email: true
  doctor_warn_streak_threshold: 2
  failure_email_subject_prefix: "[AI日报调度失败]"
  doctor_alert_subject_prefix: "[AI日报健康检查告警]"
